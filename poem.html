<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grit Garden</title>
  <meta name="description" content="A poem grown from daily struggle.">

  <!-- Open Graph -->
  <meta property="og:title" content="Grit Garden">
  <meta property="og:description" content="A poem grown from daily struggle.">
  <meta property="og:type" content="article">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,600;1,200;1,600&family=DM+Serif+Display&family=Sorts+Mill+Goudy:ital@1&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <script src="js/loader.js"></script>
</head>
<body>

  <main class="poem-page">
    <nav class="poem-top-bar">
      <div class="back-link-wrapper">
        <a href="garden.html" class="back-link">← way to garden</a>
        <div class="back-link-stick"></div>
      </div>
      <span class="wordle-number"></span>
    </nav>

    <header class="poem-header">
      <h1 class="poem-date">Loading...</h1>
    </header>

    <div class="poem-flower">
      <!-- Flower SVG will be rendered here -->
    </div>

    <div class="wordle-grid">
      <!-- Wordle grid will be rendered here -->
    </div>

    <section class="poem-content">
      <div class="poem-text">
        <!-- Poem will be rendered here -->
      </div>
    </section>

    <section class="share-section">
      <!-- Share link will be rendered here -->
    </section>

    <section class="grow-cta-section">
      <button class="grow-cta" id="grow-cta">played this one? grow your poem</button>
    </section>
  </main>

  <div class="sound-toggle muted">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path class="sound-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <span class="sound-text">click to hear the garden breathe</span>
  </div>

  <footer class="footer">
    <p>Each flower blooms from the journey of finding a word.</p>
  </footer>

  <div class="grass-meadow" id="grass-meadow"></div>

  <!-- Scripts -->
  <script src="js/flowers.js"></script>
  <script src="js/poem.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/grass.js"></script>
  <script src="js/wanderer.js"></script>
  <script>GrassGenerator.generate('grass-meadow');</script>
  <script>
    document.getElementById('grow-cta').addEventListener('click', function () {
      // Lazy-load the grow-your-own module on first click
      if (window.GrowYourOwn) {
        GrowYourOwn.open();
        return;
      }
      const script = document.createElement('script');
      script.src = 'js/grow-your-own.js';
      script.onload = () => GrowYourOwn.open();
      document.head.appendChild(script);
    });
  </script>

</body>
</html>
