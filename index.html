<script>
  // Sync the v2 sound toggle icon with sound state
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.querySelector('.sound-toggle-v2');
    if (!el) return;

    function updateIcon() {
      const icon = el.querySelector('.material-symbols-outlined');
      const label = el.querySelector('.font-body');
      const bars = el.querySelector('.sound-bars');
      const barHeights = { on: ['100%','66%','50%','75%'], off: ['30%','80%','80%','30%'] };
      if (window.GardenSound && GardenSound.isEnabled()) {
        icon.textContent = 'volume_up';
        label.textContent = 'the garden is breathing';
        bars.style.opacity = '1';
        bars.querySelectorAll('div').forEach((bar, i) => {
          bar.style.height = barHeights.on[i];
          bar.style.animation = `bar-pulse 1.2s ease-in-out ${i * 0.15}s infinite`;
        });
      } else {
        icon.textContent = 'volume_off';
        label.textContent = 'click to hear the garden';
        bars.style.opacity = '0.3';
        bars.querySelectorAll('div').forEach((bar, i) => {
          bar.style.height = barHeights.off[i];
          bar.style.animation = 'none';
        });
      }
    }

    el.addEventListener('click', () => setTimeout(updateIcon, 100));
    updateIcon();
  });
</script>
