<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grit Garden</title>
  <meta name="description" content="A garden of poems grown from daily struggles. Each flower tells the story of persistence.">

  <!-- Open Graph -->
  <meta property="og:title" content="Grit Garden">
  <meta property="og:description" content="A garden of poems grown from daily struggles.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,200;0,600;1,200;1,600&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #f8f6f1;
      --text-color: #2c3e2d;
      --text-muted: #5d6b5e;
      --green: #6aaa64;
      --green-dark: #3d6b3d;
      --yellow: #c9b458;
    }

    body {
      font-family: 'DM Serif Display', Georgia, serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle sand texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.25;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Scattered flowers container */
    .scattered-flowers {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .scattered-flower {
      position: absolute;
      opacity: 0.85;
      animation: gentle-float 8s ease-in-out infinite;
    }

    .scattered-flower:nth-child(odd) {
      animation-direction: reverse;
    }

    .scattered-flower.side-only {
      display: block;
    }

    @media (max-width: 600px) {
      .scattered-flower.side-only {
        display: block;
      }
    }

    @keyframes gentle-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }

    /* Main content */
    .landing-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 20px;
    }

    .title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 4.5rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.02em;
      margin-bottom: 24px;
      line-height: 1.1;
    }

    .tagline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 200;
      font-style: italic;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 60px;
    }

    .tagline s {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .hanging-sign-wrapper {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      animation: sign-sway 4s ease-in-out infinite;
      transform-origin: top center;
    }

    @keyframes sign-sway {
      0%, 100% { transform: rotate(-1.5deg); }
      50% { transform: rotate(1.5deg); }
    }

    .hanging-ropes {
      display: flex;
      gap: 50px;
    }

    .hanging-ropes span {
      width: 1px;
      height: 14px;
      background: #9a8b72;
    }

    .enter-btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #c4a882 0%, #b89b72 30%, #c9a87a 50%, #b08e65 80%, #a8845e 100%);
      color: #4a3728;
      font-family: 'Sorts Mill Goudy', Georgia, serif;
      font-style: italic;
      font-size: 1.15rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      box-shadow: 2px 3px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      transition: box-shadow 0.2s;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(74,55,40,0.2);
      border-radius: 2px;
    }

    .enter-btn:hover {
      box-shadow: 2px 4px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    /* Sound toggle */
    .sound-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-color);
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .sound-toggle:hover {
      opacity: 1;
    }

    .sound-toggle svg {
      width: 18px;
      height: 18px;
    }

    .sound-toggle.muted svg .sound-wave {
      display: none;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .title {
        font-size: 2.8rem;
      }

      .tagline {
        font-size: 1rem;
        letter-spacing: 0.1em;
      }
    }
  </style>
  <script src="js/loader.js"></script>
</head>
<body>

  <!-- Scattered flowers -->
  <div class="scattered-flowers" id="scattered-flowers"></div>

  <!-- Main content -->
  <main class="landing-content">
    <h1 class="title">Grit Garden</h1>
    <p class="tagline">poems grown from daily <s>puzzles</s> struggles</p>

    <div class="hanging-sign-wrapper">
      <div class="hanging-ropes"><span></span><span></span></div>
      <a href="garden.html" class="enter-btn">way to garden →</a>
    </div>

    <div class="sound-toggle muted" id="sound-toggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path class="sound-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path class="sound-wave" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <span class="sound-text">Click to hear the garden breathe</span>
    </div>
  </main>

  <script src="js/flowers.js"></script>
  <script src="js/sound.js"></script>
  <script>
    // Scatter flowers across the page
    (function() {
      const container = document.getElementById('scattered-flowers');

      // Flower positions (percentage-based for responsiveness)
      // Clear band at y 28-62 so text/button/sound stay readable
      const positions = [
        // === TOP ZONE (y 0-27) ===
        // Corners
        { x: 5, y: 4, size: 42 },
        { x: 92, y: 3, size: 38 },
        // Row 1
        { x: 15, y: 2, size: 26 },
        { x: 38, y: 3, size: 28 },
        { x: 55, y: 5, size: 24 },
        { x: 70, y: 4, size: 34 },
        { x: 82, y: 2, size: 30 },
        // Row 2
        { x: 8, y: 10, size: 30 },
        { x: 25, y: 9, size: 26 },
        { x: 45, y: 12, size: 22 },
        { x: 65, y: 10, size: 28 },
        { x: 88, y: 11, size: 32 },
        // Row 3
        { x: 3, y: 17, size: 34 },
        { x: 18, y: 16, size: 24 },
        { x: 35, y: 18, size: 20 },
        { x: 52, y: 19, size: 22 },
        { x: 72, y: 17, size: 26 },
        { x: 93, y: 18, size: 28 },
        // Row 4 (transition edge)
        { x: 6, y: 24, size: 28 },
        { x: 22, y: 23, size: 22 },
        { x: 42, y: 25, size: 18 },
        { x: 60, y: 24, size: 20 },
        { x: 78, y: 22, size: 24 },
        { x: 95, y: 25, size: 30 },

        // === BOTTOM ZONE (y 68-98) ===
        // Row 1 (transition edge)
        { x: 5, y: 69, size: 28 },
        { x: 20, y: 70, size: 22 },
        { x: 40, y: 68, size: 18 },
        { x: 58, y: 69, size: 20 },
        { x: 78, y: 68, size: 24 },
        { x: 94, y: 70, size: 30 },
        // Row 2
        { x: 3, y: 70, size: 34 },
        { x: 18, y: 72, size: 26 },
        { x: 35, y: 70, size: 24 },
        { x: 50, y: 71, size: 22 },
        { x: 68, y: 69, size: 28 },
        { x: 85, y: 71, size: 30 },
        // Row 3
        { x: 10, y: 77, size: 30 },
        { x: 28, y: 78, size: 24 },
        { x: 45, y: 76, size: 20 },
        { x: 62, y: 78, size: 26 },
        { x: 78, y: 77, size: 22 },
        { x: 93, y: 76, size: 32 },
        // Row 4
        { x: 4, y: 84, size: 36 },
        { x: 20, y: 83, size: 28 },
        { x: 38, y: 85, size: 22 },
        { x: 55, y: 83, size: 24 },
        { x: 72, y: 84, size: 26 },
        { x: 90, y: 83, size: 30 },
        // Row 5
        { x: 12, y: 90, size: 32 },
        { x: 30, y: 91, size: 26 },
        { x: 48, y: 89, size: 22 },
        { x: 65, y: 90, size: 28 },
        { x: 82, y: 91, size: 24 },
        // Bottom edge
        { x: 5, y: 96, size: 40 },
        { x: 22, y: 95, size: 34 },
        { x: 40, y: 97, size: 26 },
        { x: 58, y: 95, size: 30 },
        { x: 75, y: 96, size: 36 },
        { x: 92, y: 94, size: 38 },
      ];

      // Side flowers in the center band (vertical lines flanking content)
      const sidePositions = [
        // Left side
        { x: 2, y: 30, size: 28 },
        { x: 3, y: 36, size: 24 },
        { x: 2, y: 42, size: 26 },
        { x: 3, y: 48, size: 24 },
        { x: 2, y: 54, size: 28 },
        { x: 3, y: 60, size: 24 },
        { x: 2, y: 66, size: 26 },
        // Right side
        { x: 95, y: 30, size: 28 },
        { x: 94, y: 36, size: 24 },
        { x: 95, y: 42, size: 26 },
        { x: 94, y: 48, size: 24 },
        { x: 95, y: 54, size: 28 },
        { x: 94, y: 60, size: 24 },
        { x: 95, y: 66, size: 26 },
      ];

      positions.forEach((pos, i) => {
        const div = document.createElement('div');
        div.className = 'scattered-flower';
        div.style.left = pos.x + '%';
        div.style.top = pos.y + '%';
        div.style.animationDelay = (i * 0.5) + 's';

        const seed = Date.now() + i * 1000;
        div.innerHTML = FlowerGenerator.generateSingleFlower(
          Math.random() > 0.5 ? 'green' : 'yellow',
          pos.size,
          seed
        );

        container.appendChild(div);
      });

      sidePositions.forEach((pos, i) => {
        const div = document.createElement('div');
        div.className = 'scattered-flower side-only';
        div.style.left = pos.x + '%';
        div.style.top = pos.y + '%';
        div.style.animationDelay = ((positions.length + i) * 0.5) + 's';

        const seed = Date.now() + (positions.length + i) * 1000;
        div.innerHTML = FlowerGenerator.generateSingleFlower(
          Math.random() > 0.5 ? 'green' : 'yellow',
          pos.size,
          seed
        );

        container.appendChild(div);
      });

      // Hide loader once flowers are rendered
      if (window.Loader) Loader.hide();
    })();


    // Flag logic (off by default - always show landing)
    const SKIP_LANDING_FLAG = false;

    if (SKIP_LANDING_FLAG && localStorage.getItem('seenLanding')) {
      window.location.href = 'garden.html';
    }

    // Mark as seen when entering
    document.querySelector('.enter-btn').addEventListener('click', () => {
      localStorage.setItem('seenLanding', 'true');
    });
  </script>

</body>
</html>
