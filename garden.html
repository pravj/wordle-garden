<body>

  <header class="header">
    <div class="header-row">
      <h1>Grit Garden</h1>
      <div class="sound-toggle muted" title="toggle sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path class="sound-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>

    </div>
    <p>poems grown from daily <s>struggles</s> wordles</p>

  <main class="garden">
    <!-- Flowers will be rendered here by JavaScript -->

  <section class="submit-section">
    <p>Want to add your Wordle to the garden?</p>
    <a href="mailto:hackpravj@gmail.com?subject=Wordle%20Garden%20Submission" class="submit-link">Share Your Wordle</a>

  <footer class="footer">
    <p>Each flower blooms from the journey of finding a word.</p>
  </footer>

  <div class="grass-meadow" id="grass-meadow"></div>

  <!-- Scripts -->
  <script src="js/greenery.js"></script>

  <script src="js/sound.js"></script>
  <script src="js/wanderer.js"></script>
  <script>
    // Start both particle systems
    (function() {
      const scenes = window.ParticleToggles;
      if (!scenes) return;
      scenes.gardenMix.start();
      scenes.dandelion.start();
    })();
  </script>
  <script src="js/grass.js"></script>
  <script>GrassGenerator.generate('grass-meadow');</script>
